<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>Rina Camera</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🐈 Rina Camera</h1>

<div class="card">

<h2>状態</h2>

<p id="status">
⚪ 監視停止
</p>
<p id="cameraStatus">
📷 カメラ：未接続
</p>
  
<p id="mode">
🌙 監視モード：夜だけ
</p>

<button onclick="startMonitor()">
▶ 監視開始
</button>

<button onclick="stopMonitor()">
■ 監視停止
</button>

<button onclick="openSettings()">
⚙ 設定
</button>

</div>

<div class="card">

<h2>📷 ライブ映像</h2>

<div class="live-box">

<img
id="liveCamera"
src="images/no-camera.png"
class="live-image">

</div>

</div>

<div class="card">

<h2>今日の検知</h2>

<p id="catCount">
🐈 猫　0件
</p>

<p id="personCount">
🚶 人　0件
</p>

</div>

<div class="card">

<h2>履歴</h2>

<div id="history">

<div class="history-card">

まだ検知はありません

</div>

</div>

</div>

<script src="js/camera.js"></script>
<script src="js/notify.js"></script>
<script src="js/ai.js"></script>

<script src="script.js"></script>

<footer class="version">

Rina Camera Ver.1.0

</footer>
</body>

</html>
